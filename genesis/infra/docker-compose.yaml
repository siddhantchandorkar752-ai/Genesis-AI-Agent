version: '3.8'

services:
  api:
    build: 
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - POSTGRES_URL=postgresql://genesis:secret@postgres:5432/genesis_db
    depends_on:
      - redis
      - postgres

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  postgres:
    image: ankane/pgvector:latest
    environment:
      - POSTGRES_USER=genesis
      - POSTGRES_PASSWORD=secret
      - POSTGRES_DB=genesis_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
