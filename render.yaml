services:
  - type: web
    name: genesis-ai-agent-backend
    env: python
    rootDir: genesis/backend
    buildCommand: cd genesis/backend && pip install -r requirements.txt
    startCommand: cd genesis/backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0
